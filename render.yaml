services:
  - type: web
    name: mentorti-nexus
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python -m backend.scripts.ingest_samples && cd frontend && npm ci && npm run build
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://mentorti-nexus.vercel.app
      - key: OPENROUTER_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: FALLBACK_LLM_MODELS
        value: llama-3.1-8b-instant
      - key: LLM_TEMPERATURE
        value: "0.2"
      - key: FAISS_INDEX_PATH
        value: data/faiss_index
      - key: RAW_DOCS_PATH
        value: data/raw
      - key: RETRIEVER_K
        value: "4"
      - key: SCORE_THRESHOLD
        value: "0.25"
      - key: CHUNK_SIZE
        value: "1000"
      - key: CHUNK_OVERLAP
        value: "200"
