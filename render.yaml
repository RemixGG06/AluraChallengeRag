services:
  - type: web
    name: mentorti-nexus
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && cd frontend && npm ci && npm run build
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://mentorti-nexus.vercel.app
      - key: LLM_MODEL
        value: google/gemma-4-26b-a4b-it:free
      - key: FALLBACK_LLM_MODELS
        value: nvidia/nemotron-3-nano-30b-a3b:free,tencent/hy3:free
      - key: LLM_TEMPERATURE
        value: "0.2"
      - key: FAISS_INDEX_PATH
        value: data/faiss_index
      - key: RAW_DOCS_PATH
        value: data/raw
      - key: RETRIEVER_K
        value: "4"
      - key: SCORE_THRESHOLD
        value: "0.25"
      - key: CHUNK_SIZE
        value: "1000"
      - key: CHUNK_OVERLAP
        value: "200"
